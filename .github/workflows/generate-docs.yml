name: Generate & Upload Documentation

on:
  repository_dispatch:
    types: [docs-update]
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout groomguru-docs
        uses: actions/checkout@v4

      - name: Checkout groomguru-service
        uses: actions/checkout@v4
        with:
          repository: Ankit-mangar/groomguru-service
          path: groomguru-service
          token: ${{ secrets.REPOS_PAT }}

      - name: Checkout groomguru-ui
        uses: actions/checkout@v4
        with:
          repository: Ankit-mangar/groomguru-ui
          path: groomguru-ui
          token: ${{ secrets.REPOS_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate documentation
        run: |
          python generate_docs.py \
            --be-path ./groomguru-service \
            --fe-path ./groomguru-ui \
            --output ./docs

      - name: Upload docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: groomguru-docs
          path: docs/*.docx
          retention-days: 30

      - name: Upload to Google Drive
        if: env.HAS_TOKEN == 'true'
        env:
          HAS_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN != '' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python upload_to_drive.py \
            --folder-id "$GOOGLE_DRIVE_FOLDER_ID" \
            --docs-dir ./docs
